{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3>Reserve Artwork: {{ artwork.title }}</h3>
            </div>
            <div class="card-body">
                <p>Please enter your security code to confirm the reservation.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="security_code" class="form-label">Security Code</label>
                        <input type="text" name="security_code" class="form-control" id="security_code" required>
                        <div class="form-text">This code was emailed to you upon registration.</div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">Confirm Reservation</button>
                        <a href="{% url 'artwork_detail' artwork.pk %}" class="btn btn-link mt-2">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
