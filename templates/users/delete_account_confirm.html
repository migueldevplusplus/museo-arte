{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-danger text-white text-center py-3">
                <h3 class="mb-0">Eliminar cuenta</h3>
            </div>
            <div class="card-body p-4 text-center">
                <i class="fas fa-exclamation-triangle text-danger" style="font-size: 4rem;"></i>
                <h4 class="mt-3">¿Estás seguro?</h4>
                <p class="text-muted mb-4">Esta acción eliminará permanentemente su cuenta y todos sus datos. No se puede deshacer.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Ingrese su contraseña para confirmar</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'profile' %}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-danger">Sí, eliminar mi cuenta</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
