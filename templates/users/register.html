{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3>Register as Buyer</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}
                                <div class="form-text">{{ field.help_text }}</div>
                            {% endif %}
                            {% for error in field.errors %}
                                <div class="text-danger">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary">Register & Pay Membership ($10)</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const ccInput = document.getElementById('id_credit_card_number');
        if (ccInput) {
            ccInput.addEventListener('input', function (e) {
                let target = e.target;
                let value = target.value.replace(/\D/g, '').substring(0, 16);
                let formattedValue = value.match(/.{1,4}/g)?.join('-') || value;
                target.value = formattedValue;
            });
        }
    });
</script>
{% endblock %}
