{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header text-center text-white py-3"
                style="background: linear-gradient(135deg, #0a1928 0%, #1a2f3f 100%);">
                <h3 class="mb-0">Cambiar contraseña</h3>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Contraseña actual</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nueva contraseña</label>
                        <input type="password" name="new_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Confirmar nueva contraseña</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn"
                            style="background: linear-gradient(135deg, #0a1928 0%, #1a2f3f 100%); color: white; border: none; border-radius: 30px;">
                            Actualizar contraseña
                        </button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'profile' %}" class="text-muted">← Volver al perfil</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
